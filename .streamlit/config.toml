# Dark base theme so native widgets (dataframes/grids, inputs, expanders) render dark
# to match the custom CSS. Without this, st.dataframe shows a white grid.
[theme]
base = "dark"
primaryColor = "#6df200"
backgroundColor = "#0b0e17"
secondaryBackgroundColor = "#131827"
textColor = "#e6e8ef"

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false
